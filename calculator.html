<html>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<head>

    <title>Real Calculator</title>

    <style>

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #222;
            font-family: Arial;
        }

        .calculator {
            background: #333;
            padding: 20px;
            border-radius: 10px;
            width: 260px;
        }

        .display {
            width: 100%;
            height: 50px;
            background: #000;
            color: #0f0;
            text-align: right;
            font-size: 24px;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
            overflow-x: auto;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        button {
            padding: 15px;
            font-size: 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .number {
            background: #555;
            color: white;
        }

        .operator {
            background: orange;
            color: white;
        }

        .equal {
            background: green;
            color: white;
            grid-column: span 2;
        }

        .clear {
            background: red;
            color: white;
        }

        .delete {
            background: gray;
            color: white;
        }
    </style>

</head>

<body>

    <div class="calculator">
        <div id="display" class="display">0</div>

        <div class="buttons">
            <button class="clear" onclick="clearDisplay()">C</button>
            <button class="delete" onclick="deleteLast()">⌫</button>
            <button class="operator" onclick="append('%')">%</button>
            <button class="operator" onclick="append('/')">/</button>

            <button class="number" onclick="append('7')">7</button>
            <button class="number" onclick="append('8')">8</button>
            <button class="number" onclick="append('9')">9</button>
            <button class="operator" onclick="append('*')">*</button>

            <button class="number" onclick="append('4')">4</button>
            <button class="number" onclick="append('5')">5</button>
            <button class="number" onclick="append('6')">6</button>
            <button class="operator" onclick="append('-')">-</button>

            <button class="number" onclick="append('1')">1</button>
            <button class="number" onclick="append('2')">2</button>
            <button class="number" onclick="append('3')">3</button>
            <button class="operator" onclick="append('+')">+</button>

            <button class="number" onclick="append('0')">0</button>
            <button class="number" onclick="append('.')">.</button>
            <button class="equal" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        let display = document.getElementById("display");

        function append(value) {
            if (display.innerText === "0") {
                display.innerText = value;
            } else {
                display.innerText += value;
            }
        }

        function clearDisplay() {
            display.innerText = "0";
        }

        function deleteLast() {
            display.innerText = display.innerText.slice(0, -1) || "0";
        }

        function calculate() {
            try {
                display.innerText = eval(display.innerText);
            } catch {
                display.innerText = "Error";
            }
        }

        // Keyboard support
        document.addEventListener("keydown", (e) => {
            if (!isNaN(e.key) || "+-*/.%".includes(e.key)) {
                append(e.key);
            } else if (e.key === "Enter") {
                calculate();
            } else if (e.key === "Backspace") {
                deleteLast();
            } else if (e.key === "Escape") {
                clearDisplay();
            }
        });
    </script>

</body>

</html>
